name: Publish Event Store UI image

on:
  push:
    branches:
      - main
    tags:
      - 'goes-ui-v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/goes-ui

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: metadata
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: latest=auto
          tags: |
            type=raw,value=edge,enable={{is_default_branch}}
            type=semver,pattern={{version}},value=${{ github.ref_name }},match=^goes-ui-v(.*)$,enable=${{ startsWith(github.ref, 'refs/tags/goes-ui-v') }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.ref_name }},match=^goes-ui-v(.*)$,enable=${{ startsWith(github.ref, 'refs/tags/goes-ui-v') }}
            type=semver,pattern={{major}},value=${{ github.ref_name }},match=^goes-ui-v(.*)$,enable=${{ startsWith(github.ref, 'refs/tags/goes-ui-v') && !startsWith(github.ref, 'refs/tags/goes-ui-v0.') }}
            type=sha,prefix=sha-

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Build and publish image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          annotations: ${{ steps.metadata.outputs.annotations }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true
